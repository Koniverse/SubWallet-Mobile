// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        androidXBrowser = "1.4.0"
        kotlinVersion = "2.0.21"
        ndkVersion = "26.1.10909125"
    }
    subprojects { subproject ->
        afterEvaluate {
            if (subproject.plugins.hasPlugin('com.android.application') ||
                subproject.plugins.hasPlugin('com.android.library')) {
                subproject.android {
                    compileSdkVersion rootProject.ext.compileSdkVersion
                    buildToolsVersion rootProject.ext.buildToolsVersion
                    ndkVersion rootProject.ext.ndkVersion
                }
            }
        }
    }
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.1")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21")
        classpath('org.mozilla.rust-android-gradle:plugin:0.9.3')
    }
}

// Force all modules to use the same Kotlin version
allprojects {
    configurations.all {
        resolutionStrategy {
            force "org.jetbrains.kotlin:kotlin-stdlib:2.0.21"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.0.21"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.0.21"
            force "org.jetbrains.kotlin:kotlin-reflect:2.0.21"
            // Force Okio compatible with Kotlin 2.0
            force "com.squareup.okio:okio:3.9.0"

            // Force OkHttp 4.x
            force "com.squareup.okhttp3:okhttp:4.12.0"
            force "com.squareup.okhttp3:okhttp-urlconnection:4.12.0"
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
